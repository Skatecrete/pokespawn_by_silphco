<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#7627C5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PokeSpawn">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>PokeSpawn - Raids</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo-area">
                <img src="images/silphco.png" class="header-icon left-icon" alt="SilphCo">
                <span class="logo-text">PokeSpawn by SilphCo Web App</span>
                <img src="images/silphco.png" class="header-icon right-icon" alt="SilphCo">
            </div>
        </div>

        <div class="tabs">
            <div class="tab-row">
                <a href="current.html" class="tab-btn">📅 CURRENT EVENTS</a>
                <a href="upcoming.html" class="tab-btn">🔮 UPCOMING EVENTS</a>
                <a href="orders.html" class="tab-btn">📦 ORDERS CART</a>
            </div>
            <div class="tab-row">
                <a href="spawns.html" class="tab-btn">🔥 SPAWNS</a>
                <a href="raids.html" class="tab-btn active">🏆 RAIDS</a>
                <a href="history.html" class="tab-btn">📜 ORDER/RSVP HISTORY</a>
            </div>
        </div>

        <div class="content">
            <div id="raidsList" class="raids-container">
                <div class="loading">Loading raids...</div>
            </div>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Order</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <div id="loadingModal" class="modal" style="display:none">
        <div class="modal-content loading-modal">
            <div class="loading-spinner"></div>
            <p id="loadingMessage">Processing...</p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        loadCart();
        loadRaids();
    
        window.showRaidOrderDialog = showRaidOrderDialog;
        window.selectRaidPack = selectRaidPack;
        window.addRaidToCart = addRaidToCart;
        window.showDynamaxOrderDialog = showDynamaxOrderDialog;
        window.updateDynamaxQty = updateDynamaxQty;
        window.addDynamaxToCart = addDynamaxToCart;
        window.updateCartQuantity = updateCartQuantity;
        window.removeFromCart = removeFromCart;
        window.addCoinToCart = addCoinToCart;
        window.showCustomerDialog = showCustomerDialog;
        window.saveCustomerInfo = saveCustomerInfo;
        window.selectAdminAndPay = selectAdminAndPay;
        window.submitOrder = submitOrder;
        window.copyToClipboard = copyToClipboard;
        window.closeModal = closeModal;
        window.showKingiMessage = showKingiMessage;
    </script>
</body>
</html>
