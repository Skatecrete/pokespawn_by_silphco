<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#7627C5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PokeSpawn">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>PokeSpawn - Spawns</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo-area">
                <span class="logo-text">⚡ PokeSpawn</span>
                <span class="silph">Silph Co. Services</span>
            </div>
        </div>

        <div class="tabs">
            <div class="tab-row">
                <a href="spawns.html" class="tab-btn active">🔥 SPAWNS</a>
                <a href="raids.html" class="tab-btn">🏆 RAIDS</a>
                <a href="orders.html" class="tab-btn">📦 ORDERS CART</a>
            </div>
            <div class="tab-row">
                <a href="current.html" class="tab-btn">📅 CURRENT EVENTS</a>
                <a href="upcoming.html" class="tab-btn">🔮 UPCOMING EVENTS</a>
                <a href="history.html" class="tab-btn">📜 ORDER HISTORY</a>
            </div>
        </div>

        <div class="content">
            <div class="search-bar">
                <input type="text" id="spawnSearch" placeholder="🔍 Search Pokemon..." onkeyup="filterSpawns()">
            </div>
            <div class="filter-bar">
                <button class="filter-chip" onclick="toggleFilter('shundo')">✨ Shundo</button>
                <button class="filter-chip" onclick="toggleFilter('shiny164')">⭐ 1/64 Shiny</button>
                <button class="filter-chip" onclick="toggleFilter('regional')">🌍 Regional</button>
                <button class="filter-chip" onclick="toggleFilter('greatLeague')">🏆 Great League</button>
                <button class="filter-chip" onclick="toggleFilter('ultraLeague')">🏆 Ultra League</button>
                <button class="filter-chip" onclick="toggleFilter('masterLeague')">🏆 Master League</button>
                <button class="filter-chip" onclick="toggleFilter('premierCup')">🏆 Premier Cup</button>
                <button class="filter-chip" onclick="toggleFilter('ultraPremier')">🏆 Ultra Premier</button>
            </div>
            <div class="disclaimer spawns-disclaimer">*Only spawn rates 0.65%+ with shiny can be Shundo hunted</div>
            <div id="spawnsList" class="list-container">
                <div class="loading">Loading spawns...</div>
            </div>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Order</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <div id="loadingModal" class="modal" style="display:none">
        <div class="modal-content loading-modal">
            <div class="loading-spinner"></div>
            <p id="loadingMessage">Processing...</p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Initialize spawns page
        loadSpawns();
        
        // Make functions global
        window.filterSpawns = filterSpawns;
        window.toggleFilter = toggleFilter;
        window.showSpawnOrderDialog = showSpawnOrderDialog;
        window.updateSpawnQty = updateSpawnQty;
        window.addSpawnOrderToCart = addSpawnOrderToCart;
        window.updateCartQuantity = updateCartQuantity;
        window.removeFromCart = removeFromCart;
        window.addCoinToCart = addCoinToCart;
        window.showCustomerDialog = showCustomerDialog;
        window.saveCustomerInfo = saveCustomerInfo;
        window.selectAdminAndPay = selectAdminAndPay;
        window.submitOrder = submitOrder;
        window.copyToClipboard = copyToClipboard;
        window.closeModal = closeModal;
        window.showKingiMessage = showKingiMessage;
    </script>
</body>
</html>
