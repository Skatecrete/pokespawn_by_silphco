<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#7627C5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PokeSpawn">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>PokeSpawn - Order History</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo-area">
                <img src="images/silphco.png" class="header-icon" alt="SilphCo">
                <span class="logo-text">PokeSpawn by SilphCo Web App</span>
            </div>
        </div>

        <div class="tabs">
            <div class="tab-row">
                <a href="current.html" class="tab-btn">📅 CURRENT EVENTS</a>
                <a href="upcoming.html" class="tab-btn">🔮 UPCOMING EVENTS</a>
                <a href="orders.html" class="tab-btn">📦 ORDERS CART</a>
            </div>
            <div class="tab-row">
                <a href="spawns.html" class="tab-btn">🔥 SPAWNS</a>
                <a href="raids.html" class="tab-btn">🏆 RAIDS</a>
                <a href="history.html" class="tab-btn active">📜 ORDER/RSVP HISTORY</a>
            </div>
        </div>

        <div class="content">
            <div class="history-section">
                <div class="history-search">
                    <input type="text" id="historyName" placeholder="Your Name *">
                    <input type="text" id="historyIgn" placeholder="In-Game Name *">
                    <button class="search-history-btn" onclick="loadCustomerHistory()">POWER UP THE DELOREAN DOC!</button>
                </div>
                <div id="historyOrders" class="history-orders" style="display:none">
                    <div class="history-title">📦 My Orders</div>
                    <div id="ordersHistoryList"></div>
                </div>
                <div id="historyRSVPs" class="history-rsvps" style="display:none">
                    <div class="history-title">📅 My RSVPs</div>
                    <div id="rsvpsHistoryList"></div>
                </div>
                <div id="historyEmpty" class="empty-history" style="display:none">No orders or RSVPs found</div>
            </div>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Order</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <div id="loadingModal" class="modal" style="display:none">
        <div class="modal-content loading-modal">
            <div class="loading-spinner"></div>
            <p id="loadingMessage">Processing...</p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        loadCart();
    
        window.loadCustomerHistory = loadCustomerHistory;
        window.closeModal = closeModal;
    </script>
</body>
</html>
